<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro-Future Focus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-amber: #ffb000;
            --neon-cyan: #00f3ff;
            --bg-dark: #0a0b10;
            --panel-bg: rgba(16, 18, 27, 0.8);
            --border: rgba(0, 243, 255, 0.2);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 243, 255, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 100%, 100% 4px, 100% 100%;
            min-height: 100vh;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* CRT Scanline Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999;
            pointer-events: none;
            background-size: 100% 3px, 3px 100%;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .retro-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(0, 243, 255, 0.05);
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        }

        .task-item {
            border-left: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .task-item:hover {
            background: rgba(0, 243, 255, 0.05);
            border-left-color: var(--neon-cyan);
            transform: translateX(4px);
        }

        .custom-checkbox {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 1px solid var(--neon-cyan);
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
        }

        .custom-checkbox:checked {
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .custom-checkbox:checked::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(0,0,0,0.2) 2px, rgba(0,0,0,0.2) 4px);
        }

        .completed-text {
            color: #4a5568;
            text-decoration: line-through;
            text-shadow: none;
        }

        .glitch-text {
            text-shadow: 2px 0 var(--neon-cyan), -2px 0 #ff00ea;
            animation: glitch 3s infinite linear alternate-reverse;
        }

        @keyframes glitch {
            0% { text-shadow: 1px 0 var(--neon-cyan), -1px 0 #ff00ea; }
            50% { text-shadow: -1px 0 var(--neon-cyan), 1px 0 #ff00ea; }
            100% { text-shadow: 2px 0 var(--neon-cyan), -2px 0 #ff00ea; }
        }

        .glow-amber { color: var(--neon-amber); text-shadow: 0 0 8px rgba(255, 176, 0, 0.4); }
        .glow-cyan { color: var(--neon-cyan); text-shadow: 0 0 8px rgba(0, 243, 255, 0.4); }

        select, input[type="date"] {
            background: transparent;
            color: var(--neon-cyan);
            border: none;
            outline: none;
        }

        option { background: #1a1c23; color: white; }

        .btn-retro {
            background: var(--neon-cyan);
            color: black;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }

        .btn-retro:hover {
            box-shadow: 0 0 15px var(--neon-cyan);
            transform: scale(1.02);
        }

        /* Empty state dash animation */
        .scan-line {
            width: 100%;
            height: 2px;
            background: var(--neon-cyan);
            opacity: 0.1;
            position: absolute;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-6xl font-bold tracking-tighter glitch-text mb-4 uppercase">System.Focus</h1>
            <div class="flex items-center justify-center gap-4 mono text-[10px] tracking-[0.4em] uppercase text-slate-500">
                <span>Status: Online</span>
                <span class="w-1 h-1 bg-cyan-400 rounded-full animate-pulse"></span>
                <span id="current-date" class="text-cyan-400"></span>
            </div>
        </header>

        <!-- Entry Console -->
        <div class="max-w-3xl mx-auto mb-16">
            <form id="todo-form" class="flex flex-col md:flex-row gap-0 retro-panel p-2">
                <div class="flex border-b md:border-b-0 md:border-r border-cyan-900/50">
                    <select id="task-type" onchange="toggleDatePicker()" class="mono text-[10px] font-bold px-6 py-4 uppercase tracking-widest cursor-pointer">
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="scheduled">Schedule</option>
                    </select>
                    <input 
                        type="date" 
                        id="task-date" 
                        class="hidden mono text-[10px] px-2"
                    >
                </div>
                <input 
                    type="text" 
                    id="todo-input" 
                    placeholder="ENTER_DATA_STRING..." 
                    class="flex-1 bg-transparent border-none px-6 py-4 text-slate-200 placeholder-slate-700 outline-none text-sm mono"
                    required
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    class="btn-retro px-8 py-3 m-1 text-xs"
                >
                    Initialize
                </button>
            </form>
        </div>

        <!-- Terminal Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Daily Terminal -->
            <div class="flex flex-col space-y-4">
                <div class="flex items-center justify-between px-2 mono">
                    <h2 class="text-xs font-bold glow-amber tracking-tighter uppercase">
                        [ 01. Daily_Protocol ]
                    </h2>
                    <span id="daily-count" class="text-[10px] text-amber-500/50">00</span>
                </div>
                <div class="retro-panel rounded-none p-4 min-h-[450px] flex flex-col border-amber-500/20">
                    <div class="scan-line"></div>
                    <ul id="daily-list" class="space-y-1 overflow-y-auto max-h-[600px] p-2 relative z-10"></ul>
                    <div id="daily-empty" class="flex-1 flex flex-col items-center justify-center opacity-20 py-20 hidden">
                        <p class="mono text-[10px] uppercase tracking-widest">Buffer Empty</p>
                    </div>
                </div>
            </div>

            <!-- Upcoming Terminal -->
            <div class="flex flex-col space-y-4">
                <div class="flex items-center justify-between px-2 mono">
                    <h2 class="text-xs font-bold glow-cyan tracking-tighter uppercase">
                        [ 02. Queue_Sync ]
                    </h2>
                    <span id="scheduled-count" class="text-[10px] text-cyan-500/50">00</span>
                </div>
                <div class="retro-panel rounded-none p-4 min-h-[450px] flex flex-col border-cyan-500/20">
                    <div class="scan-line"></div>
                    <ul id="scheduled-list" class="space-y-1 overflow-y-auto max-h-[600px] p-2 relative z-10"></ul>
                    <div id="scheduled-empty" class="flex-1 flex flex-col items-center justify-center opacity-20 py-20 hidden">
                        <p class="mono text-[10px] uppercase tracking-widest">No Future Events</p>
                    </div>
                </div>
            </div>

            <!-- Weekly Terminal -->
            <div class="flex flex-col space-y-4">
                <div class="flex items-center justify-between px-2 mono">
                    <h2 class="text-xs font-bold text-indigo-400 tracking-tighter uppercase">
                        [ 03. Global_Nodes ]
                    </h2>
                    <span id="weekly-count" class="text-[10px] text-indigo-500/50">00</span>
                </div>
                <div class="retro-panel rounded-none p-4 min-h-[450px] flex flex-col border-indigo-500/20">
                    <div class="scan-line"></div>
                    <ul id="weekly-list" class="space-y-1 overflow-y-auto max-h-[600px] p-2 relative z-10"></ul>
                    <div id="weekly-empty" class="flex-1 flex flex-col items-center justify-center opacity-20 py-20 hidden">
                        <p class="mono text-[10px] uppercase tracking-widest">Node Idle</p>
                    </div>
                </div>
            </div>

        </div>

        <footer class="mt-20 flex flex-col items-center space-y-8">
            <button onclick="clearCompleted()" class="mono text-[10px] border border-red-500/30 text-red-500/60 px-6 py-2 hover:bg-red-500 hover:text-black transition-all uppercase tracking-widest">
                Purge Completed Tasks
            </button>
            <div class="mono text-[9px] text-slate-600 flex gap-10">
                <p>Uptime: <span id="uptime">0h 0m</span></p>
                <p id="sync-status">Kernel: Active</p>
            </div>
        </footer>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('retrofuturistic-tasks')) || [];
        let lastVisitDate = localStorage.getItem('retro-last-visit') || new Date().toDateString();
        const startTime = Date.now();

        const form = document.getElementById('todo-form');
        const input = document.getElementById('todo-input');
        const typeSelect = document.getElementById('task-type');
        const dateInput = document.getElementById('task-date');
        const syncStatus = document.getElementById('sync-status');
        
        function toggleDatePicker() {
            if (typeSelect.value === 'scheduled') {
                dateInput.classList.remove('hidden');
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                dateInput.value = tomorrow.toISOString().split('T')[0];
            } else {
                dateInput.classList.add('hidden');
            }
        }

        function updateDisplayDate() {
            const dateDisplay = document.getElementById('current-date');
            const now = new Date();
            const dateString = now.toDateString();
            dateDisplay.innerText = now.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();

            if (lastVisitDate !== dateString) {
                handleNewDay(dateString);
            }

            // Uptime counter
            const diff = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(diff / 60);
            const h = Math.floor(m / 60);
            document.getElementById('uptime').innerText = `${h}h ${m % 60}m`;
        }

        function handleNewDay(currentDateStr) {
            const now = new Date();
            now.setHours(0,0,0,0);
            const todayISO = now.toISOString().split('T')[0];
            
            tasks = tasks.map(task => {
                // PROMOTE logic: Upcoming -> Daily
                if (task.type === 'scheduled' && task.dueDate <= todayISO) {
                    return { ...task, type: 'daily' };
                }
                return task;
            }).filter(task => {
                // Auto-cleanup completed daily tasks from previous sessions
                if (task.type === 'daily' && task.completed) return false;
                return true;
            });

            lastVisitDate = currentDateStr;
            localStorage.setItem('retro-last-visit', lastVisitDate);
            saveTasks();
        }

        updateDisplayDate();
        setInterval(updateDisplayDate, 1000);

        function saveTasks() {
            localStorage.setItem('retrofuturistic-tasks', JSON.stringify(tasks));
            syncStatus.innerText = `SYS_SYNC: ${new Date().toLocaleTimeString()}`;
            renderTasks();
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = input.value.trim();
            const type = typeSelect.value;
            const dueDate = dateInput.value;
            const todayISO = new Date().toISOString().split('T')[0];

            let effectiveType = type;
            if (type === 'scheduled' && dueDate === todayISO) effectiveType = 'daily';

            if (text) {
                tasks.unshift({
                    id: Date.now(),
                    text: text.toUpperCase(), // Hardcore retro look
                    completed: false,
                    type: effectiveType,
                    dueDate: (effectiveType === 'scheduled' || type === 'scheduled') ? dueDate : null
                });
                input.value = '';
                saveTasks();
            }
        });

        function toggleTask(id) {
            tasks = tasks.map(task => 
                task.id === id ? { ...task, completed: !task.completed } : task
            );
            saveTasks();
        }

        function deleteTask(id) {
            tasks = tasks.filter(task => task.id !== id);
            saveTasks();
        }

        function clearCompleted() {
            tasks = tasks.filter(task => !task.completed);
            saveTasks();
        }

        function renderTasks() {
            const dailyList = document.getElementById('daily-list');
            const scheduledList = document.getElementById('scheduled-list');
            const weeklyList = document.getElementById('weekly-list');

            const dailyTasks = tasks.filter(t => t.type === 'daily');
            const scheduledTasks = tasks.filter(t => t.type === 'scheduled');
            const weeklyTasks = tasks.filter(t => t.type === 'weekly');

            scheduledTasks.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));

            renderColumn(dailyTasks, dailyList, 'daily-empty', 'daily-count');
            renderColumn(scheduledTasks, scheduledList, 'scheduled-empty', 'scheduled-count', true);
            renderColumn(weeklyTasks, weeklyList, 'weekly-empty', 'weekly-count');
        }

        function renderColumn(taskList, container, emptyId, countId, showDate = false) {
            container.innerHTML = '';
            document.getElementById(countId).innerText = taskList.length.toString().padStart(2, '0');
            const emptyEl = document.getElementById(emptyId);

            if (taskList.length === 0) {
                emptyEl.classList.remove('hidden');
            } else {
                emptyEl.classList.add('hidden');
                taskList.forEach((task) => {
                    const li = document.createElement('li');
                    li.className = 'task-item flex flex-col gap-1 p-3 mono relative group';
                    li.setAttribute('data-id', task.id);
                    
                    let dateTag = "";
                    if (showDate && task.dueDate) {
                        const d = new Date(task.dueDate + 'T00:00:00');
                        const label = d.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit' });
                        dateTag = `<span class="text-[8px] text-cyan-400/60">[ T-${label} ]</span>`;
                    }

                    li.innerHTML = `
                        <div class="flex items-start gap-4">
                            <input type="checkbox" class="custom-checkbox mt-0.5" ${task.completed ? 'checked' : ''} 
                                onclick="toggleTask(${task.id})">
                            <div class="flex-1">
                                ${dateTag}
                                <p class="text-[11px] leading-tight transition-all ${task.completed ? 'completed-text' : ''}">
                                    ${task.text}
                                </p>
                            </div>
                            <button onclick="deleteTask(${task.id})" class="opacity-0 group-hover:opacity-100 text-red-500/40 hover:text-red-500 transition-all">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                            </button>
                        </div>
                    `;
                    container.appendChild(li);
                });
            }
        }

        renderTasks();
    </script>
</body>
</html>
